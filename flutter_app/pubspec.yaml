name: gmail_ai_assistant
description: Gmail AI Auto-Reply with Local LLM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Auth / Deep links
  url_launcher: ^6.3.0
  app_links: ^6.1.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
